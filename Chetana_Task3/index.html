<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>🌸 My To-Do List</h1>
    <span id="clock"></span>
  </header>

  <div class="input-row">
    <input type="text" id="inp" placeholder="Add a new task..." />
    <button onclick="addTask()">+ Add Task</button>
  </div>

  <div class="cols">
    <div class="box">
      <h2 class="pink">⏳ Pending <span class="badge pink" id="pc">0</span></h2>
      <div id="pendingList"></div>
    </div>
    <div class="box">
      <h2 class="teal">✅ Completed <span class="badge teal" id="cc">0</span></h2>
      <div id="completedList"></div>
    </div>
  </div>

  <div class="tip">💡 Tip: Check the box to complete. Edit or delete anytime.</div>

  <script src="script.js"></script>
</body>
</html>
